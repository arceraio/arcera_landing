# Facebook Marketing Pipeline Configuration
# Arcera Digital - Automated Posting System

pipeline:
  name: arcera-facebook-marketing
  version: "1.0"
  created: "2026-03-23"
  
models:
  # For generating post copy variants
  copy_generator: ollama/minimax-m2.5:cloud
  
  # For QA/verification
  qa: ollama/qwen:7b
  
  # For image generation (if using API)
  image: openai/dall-e-3

facebook:
  # Page/Group credentials (set via environment variables)
  page_id: "${FACEBOOK_PAGE_ID}"
  access_token: "${FACEBOOK_ACCESS_TOKEN}"
  app_id: "${FACEBOOK_APP_ID}"
  app_secret: "${FACEBOOK_APP_SECRET}"
  
  # Posting settings
  default_schedule:
    - time: "09:00"  # Monday 9am
      day: "monday"
    - time: "12:00"  # Wednesday 12pm  
      day: "wednesday"
    - time: "10:00"  # Saturday 10am
      day: "saturday"
  
  # Post types to rotate
  post_types:
    - pain_point      # Variation 1
    - simple_direct  # Variation 2
    - fear_empower   # Variation 3
    - social_proof   # Variation 4
    - new_homeowner  # Variation 5
    - question       # Variation 6
  
  # Hashtag set
  hashtags:
    primary:
      - "#Arcera"
      - "#Homeowners"
      - "#LAHomeowners"
      - "#InsuranceTips"
    secondary:
      - "#ProtectYourHome"
      - "#HomeDocumentation"
      - "#PropertyProtection"
      - "#LA"
      - "#California"
      - "#HomeownerTips"
      - "#InsuranceClaim"
      - "#DisasterRecovery"

content:
  product_name: "Arcera Digital"
  landing_url: "https://arcera-digital.netlify.app"
  pricing: "$297 one-time"
  tagline: "No monthly fees. Ever."
  
  # Email signup integration
  email_signup:
    enabled: true
    endpoint: "/api/signup"
    button_text: "Get Early Access"

creative:
  # Image generation prompts (for AI generation)
  image_prompts:
    - concept: "documentation"
      prompt: "Premium Facebook ad for home documentation app, split screen comparison, left side dark smoky damaged home outline, right side bright organized room with gold accent highlights, professional photography style, navy blue and gold color scheme"
    - concept: "price"
      prompt: "Minimalist Facebook ad, large golden price tag symbol $297, clean white background with navy blue text, premium elegant design"
    - concept: "question"
      prompt: "Facebook ad with large gold question mark symbol, modern minimalist design, navy blue background"

testing:
  # A/B testing configuration
  enabled: true
  budget_per_variant: 10  # USD per day
  
  variants:
    - name: "emotional"
      posts: [1, 3, 6]  # Pain point, fear, family
    - name: "rational"
      posts: [2, 4, 5]  # Simple, social proof, new homeowner
    - name: "engagement"
      posts: [6]  # Question

reporting:
  # Metrics to track
  metrics:
    - reach
    - engagement
    - clicks
    - conversions
    - cost_per_click
    - cost_per_conversion
    
  # Weekly report recipients
  report_to:
    - kevin@arcera.io
    
  dashboard:
    enabled: true
    url: "https://dashboard.arcera.io/facebook"

automation:
  # Auto-posting settings
  enabled: false  # Set to true after API credentials configured
  
  # Approval workflow
  approval_required: true
  
  # Queue management
  queue:
    max_posts_per_week: 10
    min_days_between_posts: 1

# Environment variables needed:
# - FACEBOOK_PAGE_ID
# - FACEBOOK_ACCESS_TOKEN
# - FACEBOOK_APP_ID
# - FACEBOOK_APP_SECRET